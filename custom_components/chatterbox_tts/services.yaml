say:
  name: Chatterbox TTS Speak
  description: Use the Chatterbox TTS engine to speak a message with optional features.
  target:
    entity:
      domain: media_player
  fields:
    # Core Settings
    tts_entity:
      name: TTS Entity
      description: The TTS entity to use for text-to-speech.
      required: true
      example: "tts.chatterbox_tts_1"
      selector:
        entity:
          domain: tts
          integration: chatterbox_tts
    message:
      name: Message
      description: The text to be spoken.
      required: true
      example: "Hello, this is a test message."
      selector:
        text:
    
    # Voice Settings
    voice:
      name: Voice
      description: Voice to use for speech generation (overrides entity default). You can type any voice name available on your server.
      required: false
      selector:
        text:
    speed:
      name: Speed
      description: Speed of the speech (0.25-4.0). 1.0 is normal speed.
      required: false
      example: 1.0
      selector:
        number:
          min: 0.25
          max: 4.0
          step: 0.05
          mode: slider
    temperature:
      name: Temperature
      description: Controls randomness. Lower is more deterministic. (0.0-1.5)
      required: false
      example: 0.8
      selector:
        number:
          min: 0.0
          max: 1.5
          step: 0.05
          mode: slider
    exaggeration:
      name: Exaggeration
      description: Controls expressiveness/exaggeration. (0.25-2.0)
      required: false
      example: 0.7
      selector:
        number:
          min: 0.25
          max: 2.0
          step: 0.05
          mode: slider
    cfg_weight:
      name: CFG Weight
      description: Classifier-Free Guidance weight. Influences adherence to prompt/style and pacing. (0.2-1.0)
      required: false
      example: 0.5
      selector:
        number:
          min: 0.2
          max: 1.0
          step: 0.05
          mode: slider
    seed:
      name: Seed
      description: Seed for generation. 0 = random.
      required: false
      example: 0
      selector:
        number:
          min: 0
          max: 2147483647
          step: 1
          mode: box
    language:
      name: Language
      description: Language code for the speech.
      required: false
      default: "en"
      example: "en"
      selector:
        text:
    
    # Playback Control
    volume:
      name: Volume
      description: Override speaker volume for this announcement (0.0-1.0).
      required: false
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.05
          mode: slider
    pause_playback:
      name: Pause Playback
      description: Pause any currently playing media during announcement (only works with Sonos speakers).
      required: false
      default: false
      selector:
        boolean: